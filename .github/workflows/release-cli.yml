name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            output: delta-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            output: delta-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-x64
            output: delta-darwin-x64
            os: macos-latest
          - target: bun-darwin-arm64
            output: delta-darwin-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd cli && bun install
      - run: cd cli && bun build src/index.ts --compile --target ${{ matrix.target }} --outfile dist/${{ matrix.output }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: cli/dist/${{ matrix.output }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect binaries
        run: |
          mkdir -p release
          for dir in artifacts/delta-*; do
            cp "$dir"/* release/
          done
          chmod +x release/*
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"
      - name: Get previous CLI tag
        id: prev_tag
        run: |
          prev=$(git tag --sort=-version:refname | grep -E '^cli-v' | sed -n '2p' || true)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            range="${{ steps.prev_tag.outputs.tag }}..HEAD"
          else
            range="HEAD"
          fi
          notes=$(git log "$range" --pretty=format:"- %s (%h)" --no-merges -- cli/)
          {
            echo "body<<RELEASE_EOF"
            echo "## delta CLI v${{ steps.version.outputs.version }}"
            echo ""
            echo "$notes"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: release/*
          generate_release_notes: false

  npm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd cli && bun install
      - run: cd cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
