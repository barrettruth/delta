name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  prepare-release:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.CI_PAT }}
      - uses: cachix/install-nix-action@v31
      - name: Bump app version
        id: version
        env:
          VERSION_BUMP: ${{ github.event.inputs.version_bump || 'patch' }}
        run: |
          git fetch origin main --tags
          VERSION="$(nix develop .#ci --command ./scripts/version/bump-app.sh "$VERSION_BUMP")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          git add package.json

          if git diff --cached --quiet; then
            echo "No version file changes to commit"
          else
            git commit -m "chore(app): release ${TAG} [skip ci]"
            git fetch origin main --tags
            git rebase origin/main
            git push origin HEAD:main
          fi

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "Tag already exists on origin: ${TAG}"
          else
            git tag -a "${TAG}" -m "delta ${TAG}"
            git push origin "${TAG}"
          fi

  release:
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get previous tag
        id: prev_tag
        run: |
          prev=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p' || true)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            range="${{ steps.prev_tag.outputs.tag }}..HEAD"
          else
            range="HEAD"
          fi
          notes=$(git log "$range" --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "body<<RELEASE_EOF"
            echo "$notes"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
