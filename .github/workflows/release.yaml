name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint:
    runs-on: [self-hosted, linux, x64, netcup, general]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command biome check .

  typecheck:
    runs-on: [self-hosted, linux, x64, netcup, general]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm tsc --noEmit

  test:
    runs-on: [self-hosted, linux, x64, netcup, general]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command pnpm vitest run --reporter=verbose --coverage.enabled --coverage.reporter=text

  build:
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command pnpm install --frozen-lockfile
      - run: nix develop --command bash scripts/fetch-fonts.sh
      - run: nix develop --command pnpm build

  release:
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get previous tag
        id: prev_tag
        run: |
          prev=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p' || true)
          echo "tag=${prev}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            range="${{ steps.prev_tag.outputs.tag }}..HEAD"
          else
            range="HEAD"
          fi
          notes=$(git log "$range" --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "body<<RELEASE_EOF"
            echo "$notes"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
