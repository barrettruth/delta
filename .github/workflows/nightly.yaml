name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new commits since last tag
        id: check
        run: |
          last_tag=$(git tag --sort=-creatordate | head -n1 || true)
          if [ -z "$last_tag" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$(git rev-list "$last_tag"..HEAD --count)" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    uses: ./.github/workflows/ci.yaml

  nightly:
    runs-on: ubuntu-latest
    needs: [check, ci]
    if: needs.check.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Delete previous nightly releases
        run: |
          for tag in $(git tag -l 'nightly-*'); do
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create nightly tag
        id: tag
        run: |
          tag="nightly-$(date -u +%Y%m%d)"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        run: |
          last_release=$(git tag --sort=-version:refname | grep -E '^v' | head -n1 || true)
          if [ -n "$last_release" ]; then
            range="${last_release}..HEAD"
          else
            range="HEAD"
          fi
          notes=$(git log "$range" --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "body<<RELEASE_EOF"
            echo "$notes"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
