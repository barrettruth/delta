name: Bug Report
description: Report an issue with delta
title: 'bug: '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: input
    attributes:
      label: Area
      placeholder: Web app, CLI, database, deploy, etc.
    validations:
      required: true

  - type: input
    attributes:
      label: Environment
      placeholder: Browser/runtime, OS, database, or deployment details
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open or run ...
        2. Perform ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs or screenshots
      description: Relevant console output, server logs, or screenshots
      render: text
